name: Build Android APK

on:
  push:
    tags: ['v*']        # build APK whenever you push a version tag, e.g. v1.0.0
  workflow_dispatch:    # or manually from the Actions tab

permissions:
  contents: write       # needed to create a Release with the APK attached

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Determine PWA URL
        id: pwa
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "url=https://$OWNER_LOWER.github.io/$REPO_NAME/" >> $GITHUB_OUTPUT
          echo "host=$OWNER_LOWER.github.io" >> $GITHUB_OUTPUT

      # Use a stable keystore stored as a GitHub Secret if provided.
      # If not, generate one (NOTE: regenerated keystores produce a new
      # fingerprint, so prefer providing your own once you've cut your
      # first release — see README "stable keystore" section).
      - name: Decode keystore from secret
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Generate keystore (fallback)
        if: env.HAS_KEYSTORE == 'false'
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias cozy \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass cozypass -keypass cozypass \
            -dname "CN=Cozy Mood, OU=App, O=Cozy, L=Earth, S=Earth, C=US"

      - name: Verify PWA manifest is live
        run: |
          MANIFEST_URL="${{ steps.pwa.outputs.url }}manifest.webmanifest"
          echo "Checking $MANIFEST_URL"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$MANIFEST_URL" || echo "000")
            echo "  attempt $i → $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "manifest is live ✓"
              exit 0
            fi
            sleep 10
          done
          echo "::error::manifest not reachable at $MANIFEST_URL — make sure GitHub Pages has deployed"
          exit 1

      - name: Init Bubblewrap project (non-interactive)
        run: |
          mkdir twa && cd twa

          # Pre-create bubblewrap config so it doesn't ask about JDK/SDK install
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<JSON
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          JSON

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          PWA_HOST="${OWNER_LOWER}.github.io"
          PWA_PATH="/${REPO_NAME}/"
          # Sanitise repo name into a valid Java package segment (lowercase, alnum)
          PKG_SEG=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
          if [ -z "$PKG_SEG" ]; then PKG_SEG="cozymood"; fi
          APP_PACKAGE="io.github.${OWNER_LOWER}.${PKG_SEG}"

          # Pre-write twa-manifest.json with all answers, so init doesn't prompt
          cat > twa-manifest.json <<JSON
          {
            "packageId": "${APP_PACKAGE}",
            "host": "${PWA_HOST}",
            "name": "Cozy Mood Tracker",
            "launcherName": "Cozy Mood",
            "display": "standalone",
            "themeColor": "#ffd6e0",
            "navigationColor": "#ffd6e0",
            "navigationColorDark": "#1f1a23",
            "navigationDividerColor": "#ffd6e0",
            "navigationDividerColorDark": "#1f1a23",
            "backgroundColor": "#fff5f7",
            "enableNotifications": true,
            "startUrl": "${PWA_PATH}index.html",
            "iconUrl": "https://${PWA_HOST}${PWA_PATH}assets/icons/icon-512.png",
            "maskableIconUrl": "https://${PWA_HOST}${PWA_PATH}assets/icons/icon-512-maskable.png",
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "signingKey": {
              "path": "./android.keystore",
              "alias": "cozy"
            },
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://${PWA_HOST}${PWA_PATH}manifest.webmanifest",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://${PWA_HOST}${PWA_PATH}",
            "minSdkVersion": 21,
            "orientation": "default"
          }
          JSON

          echo "twa-manifest.json:"
          cat twa-manifest.json

          # Update generates the Android project files from the manifest (non-interactive)
          bubblewrap update --skipVersionUpgrade

          ls -la

      - name: Build APK
        working-directory: twa
        run: |
          cp ../android.keystore ./android.keystore
          KEYSTORE_PASS="${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'cozypass' }}"
          KEY_PASS="${{ secrets.ANDROID_KEY_PASSWORD || 'cozypass' }}"
          KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS || 'cozy' }}"
          # Feed passwords to bubblewrap on stdin (it prompts twice: keystore pass, then key pass)
          printf '%s\n%s\n' "$KEYSTORE_PASS" "$KEY_PASS" | bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath=./android.keystore \
            --signingKeyAlias="$KEY_ALIAS"

      - name: Find built APK
        id: apk
        working-directory: twa
        run: |
          APK_PATH=$(find . \( -name "app-release-signed.apk" -o -name "app-release.apk" \) | head -n 1)
          echo "Found: $APK_PATH"
          cp "$APK_PATH" ../cozy-mood.apk
          echo "path=cozy-mood.apk" >> $GITHUB_OUTPUT

      - name: Extract SHA-256 fingerprint
        id: fp
        run: |
          # Pull the cert out of the APK and grab the SHA-256
          unzip -o cozy-mood.apk -d apk_extracted META-INF/* > /dev/null
          CERT=$(ls apk_extracted/META-INF/*.RSA apk_extracted/META-INF/*.DSA apk_extracted/META-INF/*.EC 2>/dev/null | head -n 1)
          SHA256=$(keytool -printcert -file "$CERT" | grep -i "SHA256:" | awk -F': ' '{print $2}' | tr -d ' ')
          echo "Fingerprint: $SHA256"
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Generate .well-known/assetlinks.json
        run: |
          PACKAGE=""
          if [ -f twa/twa-manifest.json ]; then
            # twa-manifest.json uses "packageId"
            PACKAGE=$(grep -m1 '"packageId"' twa/twa-manifest.json | cut -d '"' -f 4 || echo "")
          fi
          if [ -z "$PACKAGE" ]; then
            OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
            REPO_NAME="${GITHUB_REPOSITORY##*/}"
            PKG_SEG=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
            [ -z "$PKG_SEG" ] && PKG_SEG="cozymood"
            PACKAGE="io.github.${OWNER_LOWER}.${PKG_SEG}"
          fi
          echo "Package: $PACKAGE"
          cat > /tmp/assetlinks.json <<JSON
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "$PACKAGE",
              "sha256_cert_fingerprints": ["${{ steps.fp.outputs.sha256 }}"]
            }
          }]
          JSON
          echo "Generated assetlinks.json:"
          cat /tmp/assetlinks.json

      - name: Commit assetlinks.json back to main
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stash the APK so it survives the checkout
          cp cozy-mood.apk /tmp/cozy-mood.apk
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          mkdir -p .well-known
          cp /tmp/assetlinks.json .well-known/assetlinks.json
          if ! git diff --quiet -- .well-known/assetlinks.json; then
            git add .well-known/assetlinks.json
            git commit -m "chore: update assetlinks.json [skip ci]"
            git push origin main
          else
            echo "assetlinks.json unchanged, skipping commit."
          fi
          # Restore the APK to the workspace root for the upload + release steps
          cp /tmp/cozy-mood.apk cozy-mood.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cozy-mood-apk
          path: cozy-mood.apk

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: cozy-mood.apk
          generate_release_notes: true
          body: |
            🌷 **Cozy Mood Tracker** Android APK

            Install on Android: download `cozy-mood.apk` below → tap to install (you may need to allow "install from unknown sources").

            Or use the web app at: ${{ steps.pwa.outputs.url }}
